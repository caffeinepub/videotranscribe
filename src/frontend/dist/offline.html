<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Internet – Arabic Scholar Translator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f13;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #6c63ff;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 16px;
      color: #a0a0b0;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }
    .tip-box {
      background: #1a1a2e;
      border: 1px solid #6c63ff44;
      border-radius: 16px;
      padding: 20px 24px;
      max-width: 340px;
      margin-bottom: 32px;
    }
    .tip-box p {
      font-size: 14px;
      color: #c0b8ff;
      line-height: 1.7;
    }
    .tip-box strong {
      color: #6c63ff;
    }
    button {
      background: #6c63ff;
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }
    button:hover { background: #5a52e0; transform: scale(1.03); }
    button:active { transform: scale(0.97); }
    .brand {
      margin-top: 40px;
      font-size: 13px;
      color: #555570;
    }
    .brand span { color: #6c63ff; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Internet Connection Nahi Hai</h1>
  <p class="subtitle">
    App chalane ke liye internet ki zaroorat hai.<br/>
    Apna Wi-Fi ya Mobile Data on karein.
  </p>
  <div class="tip-box">
    <p>
      <strong>Kya karein?</strong><br/>
      ✅ Wi-Fi connect karein<br/>
      ✅ Mobile Data on karein<br/>
      ✅ Phir neeche <strong>Try Again</strong> dabayein
    </p>
  </div>
  <button onclick="location.reload()">🔄 Try Again</button>
  <div class="brand">Made by <span>Sayed Hamza Salafi 💙</span></div>
</body>
</html>
